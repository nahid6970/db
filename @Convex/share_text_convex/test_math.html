<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KaTeX Test</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body>
    <div id="output"></div>
    <script type="module">
        import { Marked } from "https://esm.sh/marked@12.0.0";
        import { markedKatex } from "https://esm.sh/marked-katex-extension@5.1.2";

        const marked = new Marked();
        marked.use(markedKatex({
            throwOnError: false
        }));

        const markdown = "Inline math: $E = mc^2$\n\nBlock math:\n\n$$ \\int_0^\\infty e^{-x^2} dx = \\frac{\\sqrt{\\pi}}{2} $$";
        document.getElementById('output').innerHTML = marked.parse(markdown);
    </script>
</body>
</html>
