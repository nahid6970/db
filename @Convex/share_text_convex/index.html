<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href='https://fonts.googleapis.com/css?family=JetBrains Mono' rel='stylesheet'>
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/4400/4400968.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Sharing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        form {
            margin-bottom: 20px;
        }
        textarea {
            width: 98%;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        .clean-btn {
            background-color: #e74c3c;
        }
        .clean-btn:hover {
            background-color: #c0392b;
        }
        .shared-text {
            padding: 10px;
            background-color: #fff;
            border-radius: 5px;
            border: 1px solid #ccc;
            word-wrap: break-word;
        }
        .shared-text h1, .shared-text h2, .shared-text h3, .shared-text h4, .shared-text h5, .shared-text h6 {
            margin-top: 0.5em;
            margin-bottom: 0.3em;
        }
        .shared-text p, .shared-text ul, .shared-text ol {
            margin-top: 0;
            margin-bottom: 0.5em;
        }
        .shared-text *:first-child {
            margin-top: 0;
        }
        .shared-text *:last-child {
            margin-bottom: 0;
        }
        .shared-text pre {
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .shared-text code {
            font-family: 'JetBrains Mono', monospace;
            background-color: #f0f0f0;
            padding: 2px 4px;
            border-radius: 3px;
        }
        .shared-text blockquote {
            border-left: 4px solid #ccc;
            margin: 0;
            padding-left: 10px;
            color: #666;
        }
        .shared-text table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 0.5em;
        }
        .shared-text th, .shared-text td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .shared-text th {
            background-color: #f2f2f2;
        }
        .shared-text img {
            max-width: 100%;
        }
        .shared-text .katex-display {
            margin: 0.5em 0;
            overflow-x: auto;
            overflow-y: hidden;
        }
        .log-entry {
            background-color: #fff;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            position: relative;
        }
        .log-entry.pinned {
            border: 2px solid #8e44ad;
            background-color: #fdf2ff;
        }
        .timestamp {
            font-size: 12px;
            color: #666;
            font-weight: bold;
        }
        .copy-btn, .delete-btn, .edit-btn, .pin-btn {
            position: absolute;
            top: 10px;
            color: white;
            padding: 6px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        .delete-btn {
            right: 10px;
            background-color: #dc3545;
        }
        .delete-btn:hover {
            background-color: #c82333;
        }
        .edit-btn {
            right: 50px;
            background-color: #f39c12;
        }
        .edit-btn:hover {
            background-color: #e67e22;
        }
        .pin-btn {
            right: 90px;
            background-color: #9b59b6;
        }
        .pin-btn.pinned-active {
            background-color: #8e44ad;
        }
        .pin-btn.pinned-active svg {
            fill: white;
        }
        .copy-btn {
            right: 130px;
            background-color: #007BFF;
        }
        .copy-btn:hover {
            background-color: #0056b3;
        }
        .copy-btn.success {
            background-color: #28a745;
        }
        .clean-all-container {
            text-align: right;
            margin-top: 20px;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: #fff;
            width: 80%;
            height: 80%;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .modal-header h2 {
            margin: 0;
        }
        .modal-textarea {
            flex-grow: 1;
            width: 98%;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: none;
        }
        .modal-footer {
            margin-top: 15px;
            text-align: right;
        }
        .save-btn {
            background-color: #2ecc71;
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .cancel-btn {
            background-color: #95a5a6;
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Share Text Locally</h1>

    <form id="shareForm">
        <textarea id="textInput" rows="5" placeholder="Paste your text here..."></textarea><br><br>
        <button type="submit">Share</button>
    </form>

    <div class="logs">
        <h2>Previous Shared Texts:</h2>
        <div id="logsList"></div>
    </div>

    <div class="clean-all-container">
        <button class="clean-btn" onclick="cleanAll()">Clean All</button>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Text</h2>
                <button class="clean-btn" style="position: static; padding: 5px 10px;" onclick="closeModal()">×</button>
            </div>
            <textarea id="modalTextarea" class="modal-textarea"></textarea>
            <div class="modal-footer">
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
                <button class="save-btn" id="modalSaveBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { ConvexHttpClient } from "https://esm.sh/convex@1.16.0/browser";
        import { Marked } from "https://esm.sh/marked@12.0.0";
        import { markedHighlight } from "https://esm.sh/marked-highlight@2.1.1";
        import hljs from "https://esm.sh/highlight.js@11.9.0";
        
        const client = new ConvexHttpClient("https://dazzling-akita-709.convex.cloud");

        const marked = new Marked(
            markedHighlight({
                langPrefix: 'hljs language-',
                highlight(code, lang) {
                    const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                    return hljs.highlight(code, { language }).value;
                }
            })
        );
        marked.setOptions({
            gfm: true,
            breaks: true
        });

        const ICONS = {
            copy: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`,
            pin: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"></line><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"></path></svg>`,
            edit: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path><path d="m15 5 4 4"></path></svg>`,
            delete: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`,
            check: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`
        };

        let currentLogs = [];

        async function loadLogs() {
            try {
                const logs = await client.query("functions:list");
                currentLogs = logs;
                const logsList = document.getElementById('logsList');
                logsList.innerHTML = logs.map((log, index) => {
                    const date = new Date(log.timestamp);
                    const timestamp = date.toLocaleString('en-US', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: true
                    });
                    const renderedText = marked.parse(log.text);
                    return `
                        <div class="log-entry ${log.pinned ? 'pinned' : ''}" id="entry-${log._id}">
                            <div class="timestamp">${timestamp}</div>
                            <div id="log-${index}" class="shared-text">${renderedText}</div>
                            <button id="copy-btn-${index}" class="copy-btn" title="Copy" onclick="copyText(${index}, 'copy-btn-${index}')">${ICONS.copy}</button>
                            <button class="pin-btn ${log.pinned ? 'pinned-active' : ''}" title="${log.pinned ? 'Unpin' : 'Pin'}" onclick="togglePin('${log._id}')">${ICONS.pin}</button>
                            <button class="edit-btn" title="Edit" onclick="startEditing('${log._id}', ${index})">${ICONS.edit}</button>
                            <button class="delete-btn" title="Delete" onclick="deleteEntry('${log._id}')">${ICONS.delete}</button>
                        </div>
                    `;
                }).join('');

                // Render Math
                renderMathInElement(logsList, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false
                });
            } catch (err) {
                console.error("Error loading logs:", err);
            }
        }

        window.togglePin = async (id) => {
            try {
                await client.mutation("functions:togglePin", { id });
                await loadLogs();
            } catch (err) {
                console.error("Error toggling pin:", err);
            }
        };

        document.getElementById('shareForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = document.getElementById('textInput').value;
            if (text) {
                await client.mutation("functions:add", { text });
                document.getElementById('textInput').value = '';
                await loadLogs();
            }
        });

        window.deleteEntry = async (id) => {
            if (confirm("Are you sure you want to delete this entry?")) {
                await client.mutation("functions:remove", { id });
                await loadLogs();
            }
        };

        window.startEditing = (id, index) => {
            const rawText = currentLogs[index].text;
            const modal = document.getElementById('editModal');
            const textarea = document.getElementById('modalTextarea');
            const saveBtn = document.getElementById('modalSaveBtn');
            
            textarea.value = rawText;
            modal.style.display = 'flex';
            
            saveBtn.onclick = async () => {
                const newText = textarea.value;
                if (newText.trim() !== "") {
                    try {
                        await client.mutation("functions:update", { id, text: newText });
                        window.closeModal();
                        await loadLogs();
                    } catch (err) {
                        console.error("Error updating text:", err);
                        alert("Failed to save changes.");
                    }
                }
            };
        };

        window.closeModal = () => {
            document.getElementById('editModal').style.display = 'none';
        };

        window.cleanAll = async () => {
            if (confirm("Are you sure you want to delete all entries?")) {
                await client.mutation("functions:clean");
                await loadLogs();
            }
        };

        window.copyText = (index, buttonId) => {
            const text = currentLogs[index].text;
            navigator.clipboard.writeText(text);
            const copyBtn = document.getElementById(buttonId);
            const originalIcon = copyBtn.innerHTML;
            copyBtn.innerHTML = ICONS.check;
            copyBtn.classList.add('success');
            setTimeout(() => {
                copyBtn.innerHTML = originalIcon;
                copyBtn.classList.remove('success');
            }, 2000);
        };

        loadLogs();
        setInterval(loadLogs, 5000);
    </script>
</body>
</html>
